<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <!---form-->
    <div class="container"> 
        <div class="login-box">
            <form action="#">
                <div class="page-box">
              <div class="login-title">
                <h2>Login</h2>
            <p>please login to use our the platform</p>
              </div>
                <div class="page">
                <div class="input-box margin" id="email-check">
                    <input type="text" name="email" id="email" autofocus required>
                    <label for="email">Enter your email address</label>
                </div>
                <div class="input-box" id="password-check">
                    <input type="password" name="password" id="password" autofocus required>
                    <label for="password">Enter your password</label>
                </div>
                <div class="forgot">
                    <a href="#">forgot password?</a>
                </div>
                <div class="guest-mode">
                     <p>Not your computer? Use guest mode to login privately</p>
                         <a href="#">Guest mode</a>
                
                <div class="btn-box">
                    <a href="#">create account</a>
                    <button class="btn-next" id="form-valid">Login</button>
                </div>
                </div>
                
                </div>
                </div>
            </form>
             </div>
     </div>


    <script type="text/javascript" src="./js/script.js"></script>
</body>
</html>
