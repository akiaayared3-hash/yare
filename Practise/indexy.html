
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form registration</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!--header-->
    <header>
         <h1>EVANGADI</h1>
    </header>
    <div class="container">
         <div class="login-box">
            <form action="#">
                <div class="page-box">
                    <div class="login-title">
                        <h1>Login</h1>
                    </div>
                    <div class="page-box">
                        <div id="title">
                            <h2>Email</h2>
                        </div>
                        <div class="input-box">
                            <input type="email">
                            <label for="email">
                                Enter your Email address
                            </label>
                        </div>
                        <div id="title">
                            <h2>Password</h2>
                        </div>
                        <div class="input-box">
                            <input type="password">
                            <label for="password">
                                Enter your Password
                            </label>
                            <a href="#">Forgot Password?</a>
                        </div>
                        <div class="button-box">
                            <button type="submit">Login</button>
                        </div>
                        <div class="signup-link">
                           <span>Don't have an account?</span>
                             <a href="#">Sign Up</a>
                       </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <footer>
        <h1>EVANGADI</h1>
    </footer>
</body>
</html>
